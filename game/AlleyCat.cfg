; AlleyCat speech configuration.
; Configure the full endpoint URL including scheme and API base path.
; Example: https://api.openai.com/v1

[STT]
; Use speaches-ai/speaches Docker service for transcription:
Host="http://localhost:8000/v1"
Model="Systran/faster-whisper-small.en"
; ApiKey="sk-..."
; Language="en"
; Prompt="Transcribe the player's speech clearly."
; Temperature=0.0
; Timeout=30

[TTS]
; Use an OpenAI-compatible endpoint for speech generation:
Host="http://localhost:8000/v1"
Model="tts-1"
Voice="alloy"
; ApiKey="sk-..."
; Format="mp3"
; SpeedRatio=1.0
; Timeout=30
