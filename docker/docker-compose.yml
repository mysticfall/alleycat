services:
  chatterbox-tts-server:
    image: chatterbox-tts-server:cu130
    container_name: alleycat-chatterbox-api
    build:
      context: ./Chatterbox-TTS-Server
      dockerfile: ./Chatterbox-TTS-Server/Dockerfile.cu130
      args:
        RUNTIME: nvidia
    ports:
      - "8004:8004"
    volumes:
      - ./Chatterbox-TTS-Server/reference_audio:/app/reference_audio
      - ./Chatterbox-TTS-Server/outputs:/app/outputs
      - ./Chatterbox-TTS-Server/voices:/app/voices
      - ./Chatterbox-TTS-Server/logs:/app/logs
      - ./Chatterbox-TTS-Server/config.yaml:/app/config.yaml
      - ./Chatterbox-TTS-Server/model_cache:/app/model_cache
      - ~/.cache/huggingface:/app/hf_cache
    env_file: ./Chatterbox-TTS-Server/.env
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  speaches-api:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: alleycat-speaches-api
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/home/ubuntu/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  audio2face-api:
    image: audio2face-api
    container_name: alleycat-audio2face-api
    build:
      context: ./audio2face-api-server
    ports:
      - "8765:8765"
    volumes:
      - ./audio2face-api-server/model_cache:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

