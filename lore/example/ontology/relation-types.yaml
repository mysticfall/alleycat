# Canonical relation type definitions for the example lore graph.
relationTypes:
  - id: lives_in
    description: Connects a character to the location where they usually reside.
    directed: true
    sourceTypes: [character]
    targetTypes: [location]
  - id: knows_about
    description: Connects a character to a concept they understand or can discuss.
    directed: true
    sourceTypes: [character]
    targetTypes: [concept]
  - id: contains
    description: Connects a location to a concept, object, or entity strongly associated with that place.
    directed: true
    sourceTypes: [location]
    targetTypes: [concept, character]
